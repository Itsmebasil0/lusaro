
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  :root{--ld:#0a0a0f;--lc:#13131a;--la:#c9a84c;--la2:#e8c96d;--lt:#f0ede8;--lm:#8a8490;--lb:#2a2535;--lh:#1e1c28}
  body,#app{background:var(--ld);color:var(--lt);font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh}
  .sr-only{position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0)}
  nav{background:rgba(10,10,15,0.97);border-bottom:1px solid var(--lb);padding:0 1.2rem;display:flex;align-items:center;justify-content:space-between;height:58px;position:sticky;top:0;z-index:100}
  .nlogo{display:flex;align-items:center;gap:8px;cursor:pointer}
  .nm{width:32px;height:32px;background:var(--la);border-radius:7px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;color:#0a0a0f}
  .nt{font-size:17px;font-weight:700;color:var(--la);letter-spacing:2px}
  .nbtn{background:none;border:1px solid var(--lb);color:var(--lt);padding:6px 13px;border-radius:6px;cursor:pointer;font-size:12px;transition:all .2s;display:flex;align-items:center;gap:5px;text-decoration:none}
  .nbtn:hover{border-color:var(--la);color:var(--la)}
  .nbtn.p{background:var(--la);color:#0a0a0f;border-color:var(--la);font-weight:600}
  .nbtn.p:hover{background:var(--la2)}
  .hero{padding:3.5rem 1.2rem 2.5rem;text-align:center;border-bottom:1px solid var(--lb)}
  .hbadge{display:inline-flex;align-items:center;gap:5px;background:rgba(201,168,76,.1);border:1px solid rgba(201,168,76,.3);color:var(--la);padding:4px 13px;border-radius:20px;font-size:11px;margin-bottom:1.2rem;letter-spacing:1px;text-transform:uppercase}
  .hero h1{font-size:2.1rem;font-weight:700;margin-bottom:.6rem;line-height:1.2}
  .hero h1 span{color:var(--la)}
  .hero p{color:var(--lm);font-size:.95rem;max-width:440px;margin:0 auto 1.5rem;line-height:1.7}
  .hstats{display:flex;justify-content:center;gap:2.5rem;margin-top:1.5rem}
  .hstat .n{font-size:1.4rem;font-weight:700;color:var(--la)}
  .hstat .l{font-size:10px;color:var(--lm);text-transform:uppercase;letter-spacing:1px;margin-top:2px}
  .istrip{background:rgba(201,168,76,.06);border:1px solid rgba(201,168,76,.15);border-radius:12px;padding:.9rem 1.2rem;margin:1rem 1.2rem;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
  .istrip span{font-size:13px;color:var(--lm)}
  .istrip strong{color:var(--lt)}
  .ilink{background:var(--la);color:#0a0a0f;text-decoration:none;padding:6px 14px;border-radius:7px;font-size:12px;font-weight:600;display:flex;align-items:center;gap:5px}
  .ilink:hover{background:var(--la2)}
  .sec{padding:1.5rem 1.2rem}
  .ctabs{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:1.2rem}
  .ctab{background:var(--lc);border:1px solid var(--lb);color:var(--lm);padding:6px 14px;border-radius:20px;cursor:pointer;font-size:12px;transition:all .2s;display:flex;align-items:center;gap:5px}
  .ctab:hover,.ctab.a{background:rgba(201,168,76,.12);border-color:var(--la);color:var(--la)}
  .pgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:14px}
  .pcard{background:var(--lc);border:1px solid var(--lb);border-radius:13px;overflow:hidden;cursor:pointer;transition:all .25s;text-decoration:none;display:block}
  .pcard:hover{border-color:var(--la);transform:translateY(-3px)}
  .pimg{width:100%;height:155px;background:var(--lh);display:flex;align-items:center;justify-content:center;color:var(--lm);font-size:30px;position:relative;overflow:hidden}
  .pimg img{width:100%;height:100%;object-fit:cover;display:block}
  .pbadge{position:absolute;top:8px;left:8px;background:var(--la);color:#0a0a0f;font-size:9px;font-weight:700;padding:2px 7px;border-radius:4px;text-transform:uppercase;z-index:1}
  .pinfo{padding:12px}
  .ptitle{font-size:12px;font-weight:500;margin-bottom:5px;line-height:1.4;color:var(--lt)}
  .pdesc{font-size:11px;color:var(--lm);line-height:1.5;margin-bottom:9px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
  .pfoot{display:flex;align-items:center;justify-content:space-between}
  .ptag{font-size:9px;background:rgba(201,168,76,.1);color:var(--la);padding:2px 7px;border-radius:4px;text-transform:uppercase}
  .pcta{font-size:10px;color:var(--lm);display:flex;align-items:center;gap:2px}
  .empty{text-align:center;padding:3rem 1rem;color:var(--lm);grid-column:1/-1}
  .empty i{font-size:40px;margin-bottom:.8rem;opacity:.4;display:block}
  footer{background:var(--lc);border-top:1px solid var(--lb);padding:1.8rem 1.2rem;text-align:center}
  .flogo{color:var(--la);font-size:18px;font-weight:700;letter-spacing:3px;margin-bottom:.4rem}
  .flinks{display:flex;justify-content:center;gap:1.5rem;margin:.8rem 0}
  .flinks a{color:var(--lm);text-decoration:none;font-size:12px}
  .flinks a:hover{color:var(--la)}
  .lwrap{min-height:80vh;display:flex;align-items:center;justify-content:center;padding:1rem}
  .lcard{background:var(--lc);border:1px solid var(--lb);border-radius:18px;padding:2.2rem;max-width:340px;width:100%;text-align:center}
  .llogo{font-size:22px;font-weight:700;color:var(--la);letter-spacing:3px;margin-bottom:.3rem}
  .lsub{font-size:12px;color:var(--lm);margin-bottom:1.8rem}
  .lerr{background:rgba(220,38,38,.15);border:1px solid rgba(220,38,38,.3);color:#f87171;padding:9px 12px;border-radius:7px;font-size:12px;margin-bottom:.8rem}
  .fg{margin-bottom:.9rem}
  .fg label{display:block;font-size:11px;color:var(--lm);margin-bottom:5px;text-transform:uppercase;letter-spacing:.5px}
  .fg input,.fg textarea,.fg select{width:100%;background:var(--ld);border:1px solid var(--lb);color:var(--lt);padding:9px 11px;border-radius:7px;font-size:13px;transition:border-color .2s;font-family:inherit}
  .fg input:focus,.fg textarea:focus,.fg select:focus{outline:none;border-color:var(--la)}
  .fg select option{background:var(--ld)}
  .fg textarea{min-height:72px;resize:vertical}

  /* Image upload zone */
  .img-upload-zone{width:100%;height:130px;background:var(--ld);border:2px dashed var(--lb);border-radius:10px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;transition:all .2s;position:relative;overflow:hidden;margin-bottom:0}
  .img-upload-zone:hover{border-color:var(--la);background:rgba(201,168,76,.04)}
  .img-upload-zone.has-img{border-style:solid;border-color:var(--la)}
  .img-upload-zone img{width:100%;height:100%;object-fit:cover;position:absolute;inset:0}
  .img-upload-zone .overlay{position:absolute;inset:0;background:rgba(10,10,15,.6);display:flex;flex-direction:column;align-items:center;justify-content:center;opacity:0;transition:opacity .2s}
  .img-upload-zone:hover .overlay{opacity:1}
  .img-upload-zone .placeholder{display:flex;flex-direction:column;align-items:center;gap:6px;color:var(--lm);pointer-events:none}
  .img-upload-zone .placeholder i{font-size:28px;color:var(--lm)}
  .img-upload-zone .placeholder span{font-size:11px}
  .img-upload-zone input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
  .img-preview-clear{position:absolute;top:6px;right:6px;background:rgba(10,10,15,.8);border:none;color:#f87171;width:24px;height:24px;border-radius:50%;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;z-index:10;line-height:1}
  .img-preview-clear:hover{background:rgba(220,38,38,.5)}

  .btnp{background:var(--la);color:#0a0a0f;border:none;padding:10px 18px;border-radius:7px;font-weight:600;font-size:13px;cursor:pointer;width:100%;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:6px}
  .btnp:hover{background:var(--la2)}
  .btnd{background:rgba(220,38,38,.15);color:#f87171;border:1px solid rgba(220,38,38,.3);padding:5px 10px;border-radius:5px;font-size:11px;cursor:pointer}
  .btnd:hover{background:rgba(220,38,38,.3)}
  .apanel{padding:1.2rem}
  .ahead{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem;padding-bottom:.9rem;border-bottom:1px solid var(--lb)}
  .ahead h2{font-size:1.1rem;font-weight:600;color:var(--la);display:flex;align-items:center;gap:7px}
  .agrid{display:grid;grid-template-columns:1fr 1fr;gap:1.2rem}
  .acard{background:var(--lc);border:1px solid var(--lb);border-radius:13px;padding:1.3rem}
  .acard h3{font-size:13px;font-weight:600;margin-bottom:.9rem;display:flex;align-items:center;gap:6px}
  .pli{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--lb)}
  .pli:last-child{border-bottom:none}
  .pli-thumb{width:38px;height:38px;border-radius:7px;background:var(--lh);overflow:hidden;flex-shrink:0;display:flex;align-items:center;justify-content:center;color:var(--lm);font-size:14px}
  .pli-thumb img{width:100%;height:100%;object-fit:cover}
  .pli-i{flex:1;min-width:0}
  .pli-t{font-size:12px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .pli-c{font-size:10px;color:var(--lm);margin-top:2px}
  .scard{background:var(--ld);border-radius:7px;padding:.9rem;text-align:center}
  .scard .n{font-size:1.4rem;font-weight:700;color:var(--la)}
  .scard .l{font-size:10px;color:var(--lm);text-transform:uppercase;letter-spacing:.5px;margin-top:1px}
  @media(max-width:580px){.hero h1{font-size:1.5rem}.agrid{grid-template-columns:1fr}.hstats{gap:1.5rem}}
</style>

const SUPABASE_ANON_KEY =
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inhibmd3cHpjaWlucm1zcGJza3prIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODExNTgyMjMsImV4cCI6MjA5NjczNDIyM30.OqXwczpW0-08sMD_JnbWvZGMpLQY_nltMvPhvcOmAz8";

const S={

  logErr:'',

};
async function uploadImage(file){

  const fileName =
    `${Date.now()}-${file.name}`;

  const { error } =
    await supabase.storage
      .from('product-images')
      .upload(fileName,file);

  if(error){
    throw error;
  }

  const { data } =
    supabase.storage
      .from('product-images')
      .getPublicUrl(fileName);

  return data.publicUrl;
}
async function loadProducts() {

  const { data, error } = await supabase
    .from('products')
    .select('*')
    .order('created_at', { ascending:false });

  if(error){
    console.error(error);
    return;
  }

  S.prods = data.map(item => ({
    id:item.id,
    title:item.title,
    desc:item.description,
    link:item.link,
    cat:item.category,
    badge:item.badge,
    img:item.image_url
  }));

  render();
}

  <div class="istrip">

  <div class="sec">

    <p style="font-size:12px;color:var(--lm);margin-bottom:.6rem">Your aesthetic product destination</p>
    <div class="flinks"><a href="${INSTA}" target="_blank">Instagram</a><a href="#" onclick="gLogin();return false">Admin Login</a></div>

function rAdmin(){
  const catOpts=CATS.filter(c=>c.id!=='all').map(c=>`<option value="${c.id}">${c.label}</option>`).join('');
  const items=S.prods.length?S.prods.map((p,i)=>`

    <div class="agrid">
      <div class="acard">
        <h3><i class="ti ti-circle-plus" aria-hidden="true"></i>Add Product</h3>

      </div>
      <div class="acard">
        <h3><i class="ti ti-list" aria-hidden="true"></i>Products (<span id="pcnt">${S.prods.length}</span>)</h3>

}

function bAdmin(){
  // Image upload handler
  const fileInput=document.getElementById('fimg');
  const zone=document.getElementById('imgzone');
  S.pendingImg=null;

  fileInput.addEventListener('change',function(){
    const file=this.files[0];
    if(!file)return;
    const reader=new FileReader();
    reader.onload=function(e){
      S.pendingImg=e.target.result;
      // Show preview in zone
      zone.classList.add('has-img');
      zone.innerHTML=`
        <img src="${S.pendingImg}" alt="Preview">
        <div class="overlay"><i class="ti ti-photo-up" style="font-size:22px;color:#fff" aria-hidden="true"></i><span style="font-size:11px;color:#fff;margin-top:4px">Change photo</span></div>
        <button class="img-preview-clear" id="clearimg" title="Remove photo"><i class="ti ti-x" aria-hidden="true"></i></button>
        <input type="file" id="fimg" accept="image/*" aria-label="Upload product photo">`;
      // re-bind file input inside zone
      zone.querySelector('#fimg').addEventListener('change',function(){
        const f2=this.files[0];if(!f2)return;
        const r2=new FileReader();
        r2.onload=ev=>{S.pendingImg=ev.target.result;zone.querySelector('img').src=ev.target.result;}
        r2.readAsDataURL(f2);
      });
      document.getElementById('clearimg').addEventListener('click',function(e){
        e.stopPropagation();e.preventDefault();
        S.pendingImg=null;
        zone.classList.remove('has-img');
        zone.innerHTML=`<div class="placeholder"><i class="ti ti-photo-up" aria-hidden="true"></i><span>Click to upload product photo</span><span style="font-size:10px;margin-top:2px">JPG, PNG, WEBP</span></div><input type="file" id="fimg" accept="image/*" aria-label="Upload product photo">`;
        zone.querySelector('#fimg').addEventListener('change',handleImgChange);
      });
    };
    reader.readAsDataURL(file);
  });

  function handleImgChange(){
    const f=this.files[0];if(!f)return;
    const r=new FileReader();
    r.onload=e=>{S.pendingImg=e.target.result;zone.querySelector('img').src=e.target.result;}
    r.readAsDataURL(f);
  }

  document.getElementById('abtn').addEventListener('click',()=>{
    const t=document.getElementById('ft').value.trim();
    const l=document.getElementById('fl').value.trim();
    if(!t||!l){alert('Title and link are required.');return}
let imageUrl = null;

const imageInput =
document.getElementById('fimg');

if(imageInput.files.length){

  imageUrl = await uploadImage(
    imageInput.files[0]
  );
}

const { error } =
await supabase
.from('products')
.insert([{
  title:t,
  description:
    document.getElementById('fd').value.trim(),
  link:l,
  category:
    document.getElementById('fc').value,
  badge:
    document.getElementById('fb').value.trim(),
  image_url:imageUrl
}]);

if(error){
  alert(error.message);
  return;
}

await loadProducts();
    // Reset form
    document.getElementById('ft').value='';
    document.getElementById('fd').value='';
    document.getElementById('fl').value='';
    document.getElementById('fb').value='';
    S.pendingImg=null;
    const z=document.getElementById('imgzone');
    z.classList.remove('has-img');
    z.innerHTML=`<div class="placeholder"><i class="ti ti-photo-up" aria-hidden="true"></i><span>Click to upload product photo</span><span style="font-size:10px;margin-top:2px">JPG, PNG, WEBP</span></div><input type="file" id="fimg" accept="image/*" aria-label="Upload product photo">`;
    z.querySelector('#fimg').addEventListener('change',function(){
      const f=this.files[0];if(!f)return;
      const r=new FileReader();
      r.onload=e=>{
        S.pendingImg=e.target.result;
        z.classList.add('has-img');
        z.innerHTML=`<img src="${S.pendingImg}" alt="Preview"><div class="overlay"><i class="ti ti-photo-up" style="font-size:22px;color:#fff" aria-hidden="true"></i></div><button class="img-preview-clear" id="clearimg"><i class="ti ti-x" aria-hidden="true"></i></button><input type="file" id="fimg" accept="image/*">`;
      };r.readAsDataURL(f);
    });
    const m=document.getElementById('amsg');
    m.style.display='block';
    setTimeout(()=>{m.style.display='none'},2500);
    refreshList();
    updateStats();
  });
}

function refreshList(){
  const el=document.getElementById('plist');
  if(!el)return;
  el.innerHTML=S.prods.length?S.prods.map((p,i)=>`
    <div class="pli">
      <div class="pli-thumb">${p.img?`<img src="${p.img}" alt="">`:`<i class="ti ti-package" aria-hidden="true"></i>`}</div>
      <div class="pli-i"><div class="pli-t">${esc(p.title)}</div><div class="pli-c">${catLbl(p.cat)}</div></div>
      <button class="btnd" onclick="delProd(${i})"><i class="ti ti-trash" aria-hidden="true"></i></button>
    </div>`).join(''):`<p style="color:var(--lm);font-size:12px;text-align:center;padding:1.2rem 0">No products yet.</p>`;
  const cnt=document.getElementById('pcnt');
  if(cnt)cnt.textContent=S.prods.length;
}

function updateStats(){
  const ns=document.querySelectorAll('.scard .n');
  if(ns[0])ns[0].textContent=S.prods.length;
  if(ns[1])ns[1].textContent=new Set(S.prods.map(p=>p.cat)).size;
}

window.gHome=()=>{S.view='home';render()}
window.gLogin=()=>{if(ili()){S.view='admin';render();}else{S.view='login';S.logErr='';render();}}
window.gLogout=()=>{slo();S.view='home';render()}
window.setCat=(c)=>{S.cat=c;render()}
window.delProd = async (id) => {

  if(!confirm("Delete product?"))
    return;

  const { error } =
  await supabase
  .from('products')
  .delete()
  .eq('id', id);

  if(error){
    alert(error.message);
    return;
  }

  await loadProducts();
};
loadProducts();
</script>
